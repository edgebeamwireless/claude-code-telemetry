# Shared bearer-token auth for the OTLP receivers. Clients must send
# `Authorization: Bearer <OTEL_INGEST_TOKEN>` or their push is rejected. The
# token is read from the OTEL_INGEST_TOKEN env var (passed in via .env).
extensions:
  bearertokenauth/otlp:
    token: ${env:OTEL_INGEST_TOKEN}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: bearertokenauth/otlp
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/otlp

processors:
  # memory_limiter must be first in the pipeline; it sheds load before the
  # collector can OOM its 512M container limit.
  memory_limiter:
    check_interval: 5s
    limit_mib: 150
    spike_limit_mib: 50
  # Privacy (OPS-408): replace the raw user.email resource attribute with the
  # first 12 chars of its SHA256 hash before anything is stored. Users stay
  # distinguishable (stable per-email hash) but the raw address isn't retained.
  transform/hashemail:
    error_mode: propagate
    # user.email arrives as a DATAPOINT attribute (metrics) / log-record attribute
    # (logs) — the Prometheus exporter turns those into labels directly.
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["user.email"], Substring(SHA256(attributes["user.email"]), 0, 12)) where attributes["user.email"] != nil
    log_statements:
      - context: log
        statements:
          - set(attributes["user.email"], Substring(SHA256(attributes["user.email"]), 0, 12)) where attributes["user.email"] != nil
  batch: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    # Turn OTLP resource attributes (user.email, service.*, custom OTEL_RESOURCE_ATTRIBUTES)
    # into Prometheus labels so they are queryable.
    resource_to_telemetry_conversion:
      enabled: true
    # Names still get dots -> underscores, a `_total` suffix on counters, and the
    # metric's unit appended when set — e.g. claude_code.token.usage[tokens] ->
    # claude_code_token_usage_tokens_total, cost.usage[USD] -> ..._USD_total,
    # active_time.total[s] -> ..._seconds_total. The dashboard queries these exact names.
    add_metric_suffixes: false
  otlp_http/loki:
    endpoint: http://loki:3100/otlp

service:
  extensions: [bearertokenauth/otlp]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform/hashemail, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, transform/hashemail, batch]
      exporters: [otlp_http/loki]